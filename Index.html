<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h2>Tic Tac Toe (Human vs AI)</h2>

<div class="score">
    Human: <span id="hScore">0</span> |
    AI: <span id="aScore">0</span>
</div>

<div id="board" class="board"></div>

<p id="status"></p>

<h3>Moves</h3>
<div id="moveText" class="moves"></div>

<button onclick="newRound()">Next Game</button>

<script src="script.js"></script>
</body>
</html>
